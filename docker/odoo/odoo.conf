[options]
# Admin password for database management
admin_passwd = odoo_secure_admin_password_123

# Database configuration
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_secure_password_123
# db_name is not set - will be created on first run
db_maxconn = 64

# Server configuration
http_port = 8069
http_timeout = 7200
workers = 2
max_cron_threads = 1

# Logging
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = ['*:INFO']

# Security - Enable for first-time setup
list_db = True
secure_proxy = True

# Data directory
data_dir = /var/lib/odoo

# Addons paths
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

# Cache configuration
cache_timeout = 300

# Enable CSV and Excel export
csv_internal_sep = ,

# Email configuration (to be configured later)
# email_from = your-email@example.com
# smtp_server = smtp.example.com
# smtp_port = 587
# smtp_user = your-smtp-user
# smtp_password = your-smtp-password
# smtp_encryption = starttls

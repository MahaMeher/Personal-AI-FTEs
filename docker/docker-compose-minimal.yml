version: '3'

services:
  odoo:
    image: odoo:18.0
    container_name: odoo
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo123
      - ADMIN_PASSWORD=admin123
    depends_on:
      - db
    volumes:
      - odoo-data:/var/lib/odoo
    command: odoo --init base

  db:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo123
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  odoo-data:
  postgres-data:
